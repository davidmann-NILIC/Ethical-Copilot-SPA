<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Ethical Use of Copilot SPA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="master-header">
        <div class="header-left">
            <img src="3 logo cluster.jpg" alt="University Logos" class="cluster-logo">
            <div id="header-nav" style="display: none; align-items: center; gap: 10px;">
                <img src="Icon1.jpg" style="height: 30px;">
                <span class="header-nav-text" style="color: var(--soton-navy); font-weight: 800;">1. Understand Assignment Brief</span>
            </div>
        </div>
    </header>

    <div id="view-h1" class="view active">
        <main class="split-screen">
            <div class="pane-left"><img src="copilot-logo.png" style="max-width: 70%;" alt="Copilot"></div>
            <div class="pane-right">
                <h1 class="hero-title"><span class="highlight-pink">ETHICAL</span> USE OF COPILOT</h1>
                <p class="hero-subtitle">In assignment writing, when is it <span class="highlight-pink">ethical</span> to use Copilot?</p>
                <button class="pill-btn pink-bg" onclick="showView('view-n1')">Start Activity</button>
            </div>
        </main>
    </div>

    <div id="view-q1a" class="view">
        <main class="split-screen">
            <div class="pane-left">
                <span class="watermark-text-large" aria-hidden="true">01</span>
            </div>
            <div class="pane-right" style="text-align: center;">
                <div class="video-container-balanced">
                    <video id="q1a-video" playsinline preload="auto">
                        <source src="Video1_Question.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="question-content">
                    <p class="question-text">
                        <strong>When using your university Copilot account,</strong> can you upload your assignment brief to ask for an explanation?
                    </p>
                    <div class="q-button-row-centered">
                        <button id="btn-yes" class="pill-btn navy-bg" disabled onclick="triggerFeedback('correct')">YES</button>
                        <button id="btn-no" class="pill-btn pink-bg" disabled onclick="triggerFeedback('incorrect')">NO</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="feedback-drawer" class="drawer">
        <div class="drawer-video-balanced">
            <video id="feedback-video" width="100%" playsinline></video>
        </div>
        <h2 id="feedback-header" style="color: var(--soton-navy);"></h2>
        <div class="feedback-textbox-shadow" style="padding: 20px; background: #f9f9f9; border-radius: 10px; margin-bottom: 20px;">
            <p id="feedback-body"></p>
        </div>
        <button class="pill-btn navy-bg" onclick="closeDrawer(); showView('view-n1');">Return to Menu</button>
    </div>

    <script>
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(viewId).style.display = 'block';
            document.getElementById('header-nav').style.display = (viewId === 'view-q1a') ? 'flex' : 'none';

            if(viewId === 'view-q1a') {
                const vid = document.getElementById('q1a-video');
                const yesBtn = document.getElementById('btn-yes');
                const noBtn = document.getElementById('btn-no');

                // RESET: Disable buttons and play video
                yesBtn.disabled = true;
                noBtn.disabled = true;
                vid.currentTime = 0;
                vid.play();

                // PEDAGOGICAL LOCK: Wait 3 seconds before enabling buttons
                setTimeout(() => {
                    yesBtn.disabled = false;
                    noBtn.disabled = false;
                }, 3000); 
            }
        }

        function triggerFeedback(type) {
            const drawer = document.getElementById('feedback-drawer');
            const video = document.getElementById('feedback-video');
            const body = document.getElementById('feedback-body');
            
            body.innerHTML = "You may use your university account to ask clarifying questions about your brief, provided AI support is allowed.";
            video.src = (type === 'correct') ? "Video2_Success.mp4" : "Video3_Correction.mp4";
            
            video.play();
            drawer.classList.add('open');
        }

        function closeDrawer() { document.getElementById('feedback-drawer').classList.remove('open'); }
    </script>
</body>
</html>
